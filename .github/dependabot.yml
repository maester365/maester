# Dependabot configuration file
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
# https://containers.dev/guide/dependabot

version: 2
updates:

  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps): "

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps): "

  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps): "
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
      icons:
        patterns:
          - "@fortawesome/*"
          - "@iconify/*"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "@docusaurus/*"
          - "@fortawesome/*"
          - "@iconify/*"
          - "react"
          - "react-dom"

  - package-ecosystem: "npm"
    directory: "/report"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps): "
    ignore:
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@tailwindcss/typography"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss-animate"
        update-types: ["version-update:semver-major"]
      - dependency-name: "autoprefixer"
        update-types: ["version-update:semver-major"]
    groups:
      ui-components:
        patterns:
          - "@radix-ui/*"
          - "@headlessui/*"
          - "@tremor/*"
      icons:
        patterns:
          - "@heroicons/*"
          - "@remixicon/*"
          - "lucide-react"
      typescript-tooling:
        patterns:
          - "typescript"
          - "@types/*"
          - "eslint"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "@radix-ui/*"
          - "@headlessui/*"
          - "@tremor/*"
          - "@heroicons/*"
          - "@remixicon/*"
          - "lucide-react"
          - "typescript"
          - "@types/*"
          - "eslint"
          - "react"
          - "react-dom"
          - "react-router-dom"
