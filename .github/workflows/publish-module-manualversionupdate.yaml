name: publish-module-post-manual-version-update

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: publish-module-manualversionupdate
  cancel-in-progress: false

jobs:
  build-validation:
    uses: ./.github/workflows/build-validation.yaml
    permissions:
      contents: read
      actions: read
      pull-requests: read

  build-report:
    uses: ./.github/workflows/build-maester-report-template.yaml
    permissions:
      contents: read
      actions: read

  create-release:
    needs: [build-validation, build-report]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download updated report template
        if: needs.build-report.outputs.report-updated == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: updated-report-template
          path: powershell/assets/

      - name: Get current module  version
        id: moduleversion
        shell: pwsh
        run: ./.github/workflows/get-version.ps1

      - name: Stamp maester-config.json version fields
        shell: pwsh
        run: ./build/Update-MaesterConfigVersion.ps1 -ConfigPath tests/maester-config.json -ModuleVersion '${{ steps.moduleversion.outputs.tag }}'

      # ./module/ is a build artifact produced by Build-MaesterModule.ps1.
      # It is ignored by git and must never be committed to source control.
      - name: Build, validate, and publish Maester module
        id: publish-module
        uses: ./.github/actions/publish-maester-module
        with:
          expected-version: ${{ steps.moduleversion.outputs.tag }}
          gallery-api-key: ${{ secrets.PS_GALLERY_KEY }}

      - name: Create release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          artifacts: "maester.zip"
          replacesArtifacts: true
          allowUpdates: true
          generateReleaseNotes: true
          makeLatest: legacy
          prerelease: false
          tag: ${{ steps.moduleversion.outputs.tag }}
          commit: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        working-directory: website
        run: npm ci

      - name: Update website release version
        run: node ./build/Update-WebsiteReleaseVersion.mjs ${{ steps.moduleversion.outputs.tag }}

      - name: Commit website release version
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 #v5
        with:
          commit_message: 'ci(docs): update website release version ${{ steps.moduleversion.outputs.tag }}'
          file_pattern: |
            build/Update-WebsiteReleaseVersion.mjs
            website/docusaurus.config.js
            website/version-config.js
            website/versions.json
            website/versioned_docs/
            website/versioned_sidebars/
