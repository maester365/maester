name: Create Versioned Docs

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Stable version to publish on the website, for example 2.1.0"
        required: true
        type: string

permissions: {}

concurrency:
  group: docs-versioning-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  version_and_deploy_docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 #v7.0.1
        # Important: Fetch all history, as the versioning command often needs it.
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: website
        run: npm ci

      - name: Update website release version
        run: node ./build/Update-WebsiteReleaseVersion.mjs ${{ inputs.version }}

      - name: ✍️ Commit Version Files to Main Branch
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d #v5
        with:
          commit_message: 'ci(docs): update website release version ${{ inputs.version }}'
          file_pattern: |
            build/Update-WebsiteReleaseVersion.mjs
            website/docusaurus.config.js
            website/version-config.js
            website/versions.json
            website/versioned_docs/
            website/versioned_sidebars/
