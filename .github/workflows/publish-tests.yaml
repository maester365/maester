# Updates the maester-tests repository with the latest tests
# This is still required since we use it for the GitHub action and Azure DevOPs starter guide.
name: publish-tests
permissions:
  contents: read

concurrency:
  group: publish-tests
  cancel-in-progress: false

on:
  # Runs whenever a new Maester module is published
  release:
    types: [published]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve latest release tag
        id: release_tag
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = '${{ github.event.release.tag_name }}'
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = (gh release view --repo $env:GITHUB_REPOSITORY --json tagName -q .tagName)
          }
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Could not resolve a release tag for the stamp step."
          }
          "tag=$tag" | Out-File -Append -FilePath $env:GITHUB_OUTPUT

      - name: Stamp maester-config.json version fields
        shell: pwsh
        run: ./build/Update-MaesterConfigVersion.ps1 -ConfigPath ./tests/maester-config.json -ModuleVersion '${{ steps.release_tag.outputs.tag }}'
      - name: Publish to maester-tests
        id: push_directory
        uses: cpina/github-action-push-to-another-repository@3fc9348237c8c6954ff88e58719af8a88af543f7
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        with:
          source-directory: ./tests
          target-directory: ./tests
          destination-github-username: "maester365"
          destination-repository-name: "maester-tests"
          user-email: merill@users.noreply.github.com
          commit-message: See ORIGIN_COMMIT from $GITHUB_REF
          target-branch: main
