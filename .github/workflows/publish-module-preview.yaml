name: publish-module-preview

on:
  push:
    branches:
      - main
    paths:
      - "powershell/**"
      - "!powershell/Maester.psd1"
      - "report/**"
  workflow_dispatch:

permissions: {}

concurrency:
  group: publish-module-preview
  cancel-in-progress: false

jobs:
  build-report:
    uses: ./.github/workflows/build-maester-report-template.yaml
    permissions:
      contents: read
      actions: read

  create-preview-release:
    needs: build-report
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Download updated report template
        if: needs.build-report.outputs.report-updated == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: updated-report-template
          path: powershell/assets/

      - name: Set module version
        id: moduleversion
        shell: pwsh
        run: ./.github/workflows/minor-version-update.ps1 -preview

      - name: Stamp maester-config.json version fields
        shell: pwsh
        run: ./build/Update-MaesterConfigVersion.ps1 -ConfigPath tests/maester-config.json -ModuleVersion '${{ steps.moduleversion.outputs.tag }}'

      # ./module/ is a build artifact produced by Build-MaesterModule.ps1.
      # It is ignored by git and must never be committed to source control.
      - name: Build, validate, and publish Maester module
        id: publish-module
        uses: ./.github/actions/publish-maester-module
        with:
          expected-version: ${{ steps.moduleversion.outputs.tag }}
          gallery-api-key: ${{ secrets.PS_GALLERY_KEY }}

      - name: Archive PowerShell build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maester-module
          path: |
            ${{ github.workspace }}/module

      - name: Create release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          artifacts: "maester.zip"
          replacesArtifacts: true
          allowUpdates: true
          generateReleaseNotes: true
          makeLatest: false
          prerelease: true
          tag: ${{ steps.moduleversion.outputs.tag }}
          commit: ${{ github.sha }}

      - name: Update website preview version
        run: node ./build/Update-WebsitePreviewVersion.mjs ${{ steps.moduleversion.outputs.tag }}

      - name: Commit website preview version
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d #v5
        with:
          commit_message: 'ci(docs): update website preview version ${{ steps.moduleversion.outputs.tag }}'
          file_pattern: |
            build/Update-WebsitePreviewVersion.mjs
            website/version-config.js
