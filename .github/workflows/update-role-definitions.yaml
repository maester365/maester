name: update-role-definitions

on:
  schedule:
    - cron: "0 8 1 * *" # Monthly on the 1st at 08:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: update-role-definitions
  cancel-in-progress: false

jobs:
  update-role-definitions:
    runs-on: windows-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Generate maester-bot app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.MAESTER_BOT_APP_ID }}
          private-key: ${{ secrets.MAESTER_BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Update Entra ID role definitions
        id: update
        run: ./build/Update-MtRoleDefinitions.ps1
        shell: pwsh

      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          title: Update Entra ID role definitions
          body: |
            Automated update of Entra ID built-in role definitions from the
            [Microsoft permissions reference](https://learn.microsoft.com/en-us/entra/identity/role-based-access-control/permissions-reference).

            Updates:
            - `powershell/internal/Get-MtRoleInfo.ps1` (role hashtable with GUIDs and privileged flags)

            ## Diff summary

            ${{ steps.update.outputs.diff_summary }}

            Please review any added/removed roles before merging.
          branch: auto/update-role-definitions
          commit-message: "chore: update Entra ID role definitions"
          labels: automation
