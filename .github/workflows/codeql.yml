name: CodeQL
# This workflow replaces the GitHub-managed "Default setup" for CodeQL.
# Before merging, a repository owner must disable the Default setup at:
# Settings → Code security → Code scanning → CodeQL analysis → Switch to advanced
# Failure to do so will cause the "Perform CodeQL analysis" step to fail with:
#   "CodeQL analyses from advanced configurations cannot be processed when the default setup is enabled"

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  schedule:
    - cron: "23 8 * * 1"
  workflow_dispatch:

permissions: read-all

jobs:
  analyze:
    name: Analyze JavaScript and TypeScript
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: javascript-typescript
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
