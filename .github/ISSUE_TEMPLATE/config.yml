# Note: GitHub's community profile API may report 'issue_template: null' for repositories
# that exclusively use YAML issue forms. This is a known platform API limitation.
# The issue forms below are valid and functional. See:
# https://github.com/orgs/community/discussions/34427
blank_issues_enabled: false
contact_links:
  - name: Questions & Discussions 💬
    url: https://github.com/maester365/maester/discussions
    about: Please share any questions or ideas in the project discussions.
  - name: Documentation 📖
    url: https://maester.dev/docs/intro
    about: Maester Docs
  - name: Known Issues ⚠️
    url: https://github.com/maester365/maester/issues
    # Replace URL with a 'known issues' segment in the README.
    about: Please review the known issues before creating a new one.
